name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  semgrep:
    name: "SAST - Semgrep"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep \
            --config=p/owasp-top-ten \
            --config=p/python \
            --config=p/secrets \
            --config=p/flask \
            --config=p/sql-injection \
            --config=p/command-injection \
            --verbose \
            --error \
            .

  gitleaks:
    name: "Secret Scan - GitLeaks"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitLeaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          ./gitleaks detect --source . --verbose

  sca:
    name: "SCA - pip-audit"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  trivy:
    name: "Container Scan - Trivy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t devsecops-lab:latest .
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-lab:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
      - name: Generate SBOM
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-lab:latest
          format: cyclonedx
          output: sbom.json
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [semgrep, gitleaks, sca, trivy]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "================================"
          echo "   SECURITY PIPELINE RESULTS"
          echo "================================"
          echo "SAST Semgrep:    ${{ needs.semgrep.result }}"
          echo "GitLeaks:        ${{ needs.gitleaks.result }}"
          echo "SCA pip-audit:   ${{ needs.sca.result }}"
          echo "Trivy Container: ${{ needs.trivy.result }}"
          echo "================================"
          if [ "${{ needs.semgrep.result }}" = "failure" ] || \
             [ "${{ needs.gitleaks.result }}" = "failure" ] || \
             [ "${{ needs.sca.result }}" = "failure" ] || \
             [ "${{ needs.trivy.result }}" = "failure" ]; then
            echo "SECURITY GATE: FAILED"
            echo "Fix vulnerabilities before deploying!"
            exit 1
          fi
          echo "SECURITY GATE: PASSED"

