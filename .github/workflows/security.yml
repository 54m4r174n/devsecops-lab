name: Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  semgrep:
    name: "SAST - Semgrep"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          semgrep \
            --config=p/owasp-top-ten \
            --config=p/python \
            --config=p/flask \
            --config=p/secrets \
            --fail-on finding \
            --sarif --output semgrep.sarif \
            .

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: "Secret Scan - GitLeaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          ./gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 1

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif

  sca:
    name: "SCA - pip-audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run SCA Scan
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output pip-audit.json

      - name: Fail on Vulnerabilities
        run: |
          if [ $(jq '.vulnerabilities | length' pip-audit.json) -gt 0 ]; then
            echo "Vulnerabilities found!"
            exit 1
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: pip-audit.json

  trivy:
    name: "Container Scan - Trivy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devsecops-lab:latest .

      - name: Run Trivy Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            devsecops-lab:latest

      - name: Fail on Critical/High
        run: |
          if [ $(jq '.runs[].results | length' trivy.sarif) -gt 0 ]; then
            echo "High/Critical vulnerabilities found!"
            exit 1
          fi

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [semgrep, gitleaks, sca, trivy]
    if: always()
    steps:
      - name: Final Decision
        run: |
          echo "================================"
          echo " SECURITY GATE ENFORCED "
          echo "================================"

          if [ "${{ needs.semgrep.result }}" != "success" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.sca.result }}" != "success" ] || \
             [ "${{ needs.trivy.result }}" != "success" ]; then
            
            echo "SECURITY GATE: ❌ FAILED"
            exit 1
          fi

          echo "SECURITY GATE: ✅ PASSED"
